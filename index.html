<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamsa Elite | بوابة النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --sidebar-width: 290px;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); margin: 0; overflow-x: hidden; color: #1e293b; }
        .hidden { display: none !important; }

        /* --- شاشة الدخول --- */
        #loginPage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; position: fixed; width: 100%; z-index: 9999; }
        .login-card { width: 90%; max-width: 400px; text-align: center; padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        .input-field { width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: 2px solid #f1f5f9; outline: none; text-align: right; font-size: 16px; background: #f8fafc; }

        /* --- الرسائل الاحترافية (CSS Custom Alert) --- */
        #customAlert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 10000; display: flex; align-items: center; gap: 12px; font-weight: 800; border: 2px solid var(--primary); transition: 0.5s; }
        #customAlert.show { top: 20px; }
        .alert-icon { font-size: 20px; }

        /* --- القائمة الجانبية --- */
        .sidebar { width: var(--sidebar-width); background: white; height: 100vh; position: fixed; right: -300px; top: 0; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        .sidebar.open { right: 0; }
        .logout-circle { position: absolute; top: 15px; left: 15px; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--danger); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .profile-area { padding: 40px 20px; text-align: center; background: var(--primary-light); }
        .profile-img { width: 85px; height: 85px; border-radius: 50%; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); object-fit: cover; }
        
        .side-nav { flex: 1; padding: 20px 15px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: #64748b; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
        .nav-link.active { background: var(--primary); color: white; }

        /* --- المحتوى الرئيسي --- */
        .main-content { margin-right: 0; padding: 20px; min-height: 100vh; transition: 0.4s; }
        @media (min-width: 993px) { .main-content { margin-right: var(--sidebar-width); } .sidebar { right: 0; } .menu-btn { display: none; } }
        .welcome-card { background: linear-gradient(135deg, var(--primary), #6366f1); color: white; padding: 25px; border-radius: 20px; margin-top: 40px; }

        /* --- شبكة الاختبارات --- */
        .exams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .exam-card { background: white; padding: 15px; border-radius: 18px; border: 1px solid #f1f5f9; text-align: center; }
        .btn-start-small { background: var(--primary-light); color: var(--primary); border: none; width: 100%; padding: 8px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 12px; margin-top: 10px; }

        /* --- واجهة الاختبار --- */
        .exam-header { background: white; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; margin-bottom: 20px; }
        .timer-badge { background: var(--danger); color: white; padding: 8px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: 900; grid-column: span 2; }
        .option-item { background: #f8fafc; border: 2px solid #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-weight: 700; text-align: right; }
        .option-item.selected { border-color: var(--primary); background: var(--primary-light); }

        /* --- القائمة السفلية --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: none; justify-content: space-around; padding: 10px; border-top: 1px solid #f1f5f9; z-index: 1000; border-radius: 20px 20px 0 0; }
        .b-nav-item { text-align: center; color: #94a3b8; font-size: 10px; font-weight: 800; cursor: pointer; flex: 1; }
        .b-nav-item.active { color: var(--primary); }
        .b-nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        .menu-btn { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: white; border: none; border-radius: 12px; color: var(--primary); z-index: 1500; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1900; display: none; }
        .overlay.active { display: block; }
        @media (max-width: 992px) { .bottom-nav { display: flex; } }
    </style>
</head>
<body>

<div id="customAlert">
    <span class="alert-icon" id="alertIcon"></span>
    <span id="alertText"></span>
</div>

<div id="loginPage">
    <div class="login-card">
        <h1 style="color:var(--primary); font-weight:900;">HAMSA ELITE</h1>
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:900; margin-top:10px; cursor:pointer;">دخول</button>
    </div>
</div>

<div id="dashboardPage" class="hidden">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars-staggered"></i></button>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logout-circle" onclick="logout()"><i class="fas fa-power-off"></i></div>
        <div class="profile-area">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img">
            <div id="uName" style="font-weight:900; margin-top:10px; color:var(--primary);"></div>
            <div id="uGrade" style="font-size:12px; color:#64748b; font-weight:bold;"></div>
        </div>
        <nav class="side-nav">
            <div class="nav-link active" id="l-lessons" onclick="switchTab('lessons')"><i class="fas fa-book-open"></i> دروسي</div>
            <div class="nav-link" id="l-exams" onclick="switchTab('exams')"><i class="fas fa-graduation-cap"></i> اختباراتي</div>
            <div class="nav-link" id="l-msgs" onclick="switchTab('msgs')"><i class="fas fa-envelope"></i> الرسائل</div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="welcome-card"><h3 style="margin:0">مرحباً بك مجدداً 👋</h3></div>
        <h4 id="tabTitle" style="margin:20px 0; font-weight:900;">دروسي</h4>
        <div id="mainDisplay"></div>
    </main>

    <nav class="bottom-nav">
        <div class="b-nav-item active" id="b-lessons" onclick="switchTab('lessons')"><i class="fas fa-book-reader"></i><span>دروسي</span></div>
        <div class="b-nav-item" id="b-exams" onclick="switchTab('exams')"><i class="fas fa-edit"></i><span>الاختبارات</span></div>
        <div class="b-nav-item" id="b-msgs" onclick="switchTab('msgs')"><i class="fas fa-comment-dots"></i><span>الرسائل</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, get, child, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCr4T8GLRxtf_6LNrokjKvmBOwSkuGO5yQ",
        authDomain: "hamsa-6009e.firebaseapp.com",
        databaseURL: "https://hamsa-6009e-default-rtdb.firebaseio.com",
        projectId: "hamsa-6009e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentExam = null;
    let selectedAns = {};
    let timerInt;

    // دالة الرسائل الاحترافية
    window.showAlert = (msg, type = 'success') => {
        const box = document.getElementById('customAlert');
        const icon = document.getElementById('alertIcon');
        document.getElementById('alertText').innerText = msg;
        
        box.style.borderColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
        icon.innerHTML = type === 'success' ? '✅' : '⚠️';
        
        box.classList.add('show');
        setTimeout(() => box.classList.remove('show'), 3000);
    };

    window.login = async () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const snap = await get(child(ref(db), 'students'));
        const user = Object.values(snap.val() || {}).find(s => s.username === u && s.password === p);
        if(user) { 
            localStorage.setItem('user', JSON.stringify(user)); 
            startApp(user);
            showAlert("تم تسجيل الدخول بنجاح");
        } else showAlert("بيانات الدخول خاطئة!", "error");
    };

    function startApp(user) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        document.getElementById('uName').innerText = user.name;
        document.getElementById('uGrade').innerText = user.grade;
        switchTab('lessons');
    }

    window.switchTab = async (tab) => {
        const display = document.getElementById('mainDisplay');
        document.querySelectorAll('.nav-link, .b-nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`l-${tab}`)?.classList.add('active');
        document.getElementById(`b-${tab}`)?.classList.add('active');
        document.getElementById('tabTitle').innerText = tab === 'exams' ? "اختباراتي" : (tab === 'msgs' ? "الرسائل" : "دروسي");

        if(tab === 'exams') {
            display.innerHTML = '<button onclick="showHistory()" style="width:100%; padding:10px; border-radius:12px; border:2px solid var(--primary); background:none; color:var(--primary); font-weight:800; margin-bottom:15px; cursor:pointer;">سجل درجاتي</button><div class="exams-grid" id="examList"></div>';
            const snap = await get(child(ref(db), 'exams'));
            let html = '';
            Object.keys(snap.val() || {}).forEach(id => {
                html += `<div class="exam-card"><h4>${snap.val()[id].title}</h4><button class="btn-start-small" onclick="checkExam('${id}')">ابدأ الآن</button></div>`;
            });
            document.getElementById('examList').innerHTML = html;
        } else {
            display.innerHTML = '<div style="text-align:center; padding:50px; color:#94a3b8;">لا توجد بيانات حالياً</div>';
        }
        toggleSidebar(false);
    };

    window.checkExam = async (id) => {
        const user = JSON.parse(localStorage.getItem('user'));
        const snap = await get(child(ref(db), `results/${user.username}/${id}`));
        if(snap.exists()) showAlert("لقد أرسلت هذا الاختبار مسبقاً!", "error");
        else startQuiz(id);
    };

    window.startQuiz = async (id) => {
        const snap = await get(child(ref(db), `exams/${id}`));
        currentExam = { ...snap.val(), id: id };
        selectedAns = {};
        const startTime = localStorage.getItem(`t_${id}`) || Date.now();
        localStorage.setItem(`t_${id}`, startTime);
        renderQuiz(startTime);
    };

    function renderQuiz(startTime) {
        const user = JSON.parse(localStorage.getItem('user'));
        const display = document.getElementById('mainDisplay');
        display.innerHTML = `
            <div class="exam-header">
                <div class="timer-badge" id="timer">60:00</div>
                <div><b>المدرسة:</b> ${currentExam.school || 'النخبة'}</div>
                <div><b>الصف:</b> ${user.grade}</div>
                <div><b>الطالب:</b> ${user.name}</div>
            </div>
            <div id="qArea"></div>
            <button class="btn-start-small" style="background:var(--success); color:white; padding:15px;" onclick="submitExam()">حفظ وإرسال</button>
        `;
        currentExam.questions.forEach((q, i) => {
            let opts = q.options.map((o, oi) => `<div class="option-item" id="q${i}_o${oi}" onclick="pick(${i}, ${oi})">${o}</div>`).join('');
            document.getElementById('qArea').innerHTML += `<div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #eee;"><p><b>س${i+1}:</b> ${q.text}</p>${opts}</div>`;
        });
        runTimer(startTime);
    }

    window.pick = (q, o) => {
        selectedAns[q] = o;
        document.querySelectorAll(`[id^="q${q}_"]`).forEach(el => el.classList.remove('selected'));
        document.getElementById(`q${q}_o${o}`).classList.add('selected');
    };

    function runTimer(start) {
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            const rem = 3600 - Math.floor((Date.now() - start) / 1000);
            if(rem <= 0) submitExam(true);
            else {
                const m = Math.floor(rem/60); const s = rem%60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }
        }, 1000);
    }

    window.submitExam = async (auto = false) => {
        if(!auto && Object.keys(selectedAns).length < currentExam.questions.length) {
            showAlert("أجب على جميع الأسئلة أولاً!", "error"); return;
        }
        let score = 0;
        currentExam.questions.forEach((q, i) => { if(selectedAns[i] == q.correct) score++; });
        const user = JSON.parse(localStorage.getItem('user'));
        await set(ref(db, `results/${user.username}/${currentExam.id}`), {
            score, total: currentExam.questions.length, title: currentExam.title
        });
        clearInterval(timerInt);
        localStorage.removeItem(`t_${currentExam.id}`);
        showAlert("تم إرسال إجاباتك بنجاح ✅");
        switchTab('exams');
    };

    window.showHistory = async () => {
        const user = JSON.parse(localStorage.getItem('user'));
        const snap = await get(child(ref(db), `results/${user.username}`));
        let html = '<div style="background:white; padding:15px; border-radius:15px;"><h3>سجل درجاتي</h3>';
        if(snap.val()) Object.values(snap.val()).forEach(r => {
            html += `<div style="border-bottom:1px solid #eee; padding:8px 0;"><b>${r.title}</b>: ${r.score}/${r.total}</div>`;
        }); else html += '<p>لا توجد نتائج</p>';
        html += `<button onclick="switchTab('exams')" class="btn-start-small">إغلاق</button></div>`;
        document.getElementById('mainDisplay').innerHTML = html;
    };

    window.logout = () => {
        localStorage.clear(); // مسح البيانات من localhost
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('loginPage').classList.remove('hidden');
        showAlert("تم تسجيل الخروج");
    };

    window.toggleSidebar = (f) => {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        if(f === false) { sb.classList.remove('open'); ov.classList.remove('active'); }
        else { sb.classList.toggle('open'); ov.classList.toggle('active'); }
    };

    const saved = localStorage.getItem('user');
    if(saved) startApp(JSON.parse(saved));
</script>
</body>
</html>
