<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamsa Elite | بوابة النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --sidebar-width: 290px;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); margin: 0; overflow-x: hidden; color: #1e293b; }
        .hidden { display: none !important; }

        /* --- شاشة الدخول --- */
        #loginPage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; position: fixed; width: 100%; z-index: 9999; overflow-y: auto; padding: 20px 0; }
        .login-card { width: 90%; max-width: 400px; text-align: center; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); background: #fff; }
        .input-field, .select-field { width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: 2px solid #f1f5f9; outline: none; text-align: right; font-size: 16px; background: #f8fafc; appearance: none; }
        
        .join-link { color: var(--primary); font-weight: 800; cursor: pointer; text-decoration: underline; display: inline-block; margin-top: 15px; }
        .support-btn { background: #25d366; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: 800; margin-top: 25px; font-size: 14px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }

        /* --- التنبيهات --- */
        #customAlert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 10002; display: flex; align-items: center; gap: 12px; font-weight: 800; border: 2px solid var(--primary); transition: 0.5s; width: max-content; max-width: 90%; }
        #customAlert.show { top: 20px; }

        /* --- القائمة الجانبية --- */
        .sidebar { width: var(--sidebar-width); background: white; height: 100vh; position: fixed; right: -300px; top: 0; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        .sidebar.open { right: 0; }
        .logout-circle { position: absolute; top: 15px; left: 15px; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--danger); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .profile-area { padding: 40px 20px; text-align: center; background: var(--primary-light); }
        .profile-img { width: 85px; height: 85px; border-radius: 50%; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); object-fit: cover; }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: #64748b; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
        .nav-link.active { background: var(--primary); color: white; }

        .main-content { margin-right: 0; padding: 20px; min-height: 100vh; transition: 0.4s; padding-bottom: 100px; }
        @media (min-width: 993px) { .main-content { margin-right: var(--sidebar-width); } .sidebar { right: 0; } .menu-btn { display: none; } }
        
        .welcome-card-new { background: linear-gradient(135deg, var(--primary), #6366f1); color: white; padding: 25px; border-radius: 25px; margin-top: 50px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); position: relative; overflow: hidden; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: none; justify-content: space-around; padding: 10px; border-top: 1px solid #f1f5f9; z-index: 1000; border-radius: 20px 20px 0 0; }
        .b-nav-item { text-align: center; color: #94a3b8; font-size: 10px; font-weight: 800; cursor: pointer; flex: 1; }
        .b-nav-item.active { color: var(--primary); }
        .b-nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        .menu-btn { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: white; border: none; border-radius: 12px; color: var(--primary); z-index: 1500; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1900; display: none; }
        .overlay.active { display: block; }
        
        /* تصميم الكروت */
        .exam-item-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-done { background: #f1f5f9; color: #94a3b8; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 800; cursor: not-allowed; }
        .btn-start-quiz { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        
        .quiz-option { display: block; background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 2px solid transparent; cursor: pointer; font-weight: 600; position: relative; }
        input[type="radio"]:checked + .quiz-option { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
        input[type="radio"] { display: none; }

        /* سجل الدرجات */
        .history-btn { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grade-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; }
        .excellent { background: #dcfce7; color: #166534; }
        .very-good { background: #dbeafe; color: #1e40af; }
        .good { background: #fef3c7; color: #92400e; }
        .fail { background: #fee2e2; color: #991b1b; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 992px) { .bottom-nav { display: flex; } }
    </style>
</head>
<body>

<div id="customAlert">
    <span class="alert-icon" id="alertIcon"></span>
    <span id="alertText"></span>
</div>

<div id="loginPage">
    <div class="login-card">
        <h1 style="color:var(--primary); font-weight:900; margin-bottom:5px;">HAMSA ELITE</h1>
        <p style="color:#64748b; font-weight:600; margin-bottom:20px;">بوابة النخبة التعليمية</p>
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:900; margin-top:10px; cursor:pointer;">دخول للمنصة</button>
        <div class="join-link" onclick="toggleModal(true)">انضم إلينا الآن</div>
        <a href="https://wa.me/966534553706" class="support-btn" target="_blank"><i class="fab fa-whatsapp"></i> الدعم الفني</a>
    </div>
</div>

<div id="dashboardPage" class="hidden">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars-staggered"></i></button>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logout-circle" onclick="logout()"><i class="fas fa-power-off"></i></div>
        <div class="profile-area">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img">
            <div id="uNameSide" style="font-weight:900; margin-top:10px; color:var(--primary);"></div>
            <div id="uGradeSide" style="font-size:12px; color:#64748b; font-weight:bold;"></div>
        </div>
        <nav class="side-nav">
            <div class="nav-link active" id="l-lessons" onclick="switchTab('lessons')"><i class="fas fa-book-open"></i> دروسي</div>
            <div class="nav-link" id="l-exams" onclick="switchTab('exams')"><i class="fas fa-graduation-cap"></i> اختباراتي</div>
            <div class="nav-link" id="l-msgs" onclick="switchTab('msgs')"><i class="fas fa-envelope"></i> الرسائل</div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="welcome-card-new" id="welcomeSection">
            <h2 id="welcomeText"></h2>
            <p>استعد ليوم مليء بالإنجاز، فالعلم هو طريقك نحو القمة! 🚀</p>
        </div>
        
        <div id="tabHeader" style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
            <h4 id="tabTitle" style="margin:0; font-weight:900;">دروسي</h4>
            <div id="extraActions"></div>
        </div>
        
        <div id="mainDisplay" style="margin-top:20px;"></div>
    </main>

    <nav class="bottom-nav">
        <div class="b-nav-item active" id="b-lessons" onclick="switchTab('lessons')"><i class="fas fa-book-reader"></i><span>دروسي</span></div>
        <div class="b-nav-item" id="b-exams" onclick="switchTab('exams')"><i class="fas fa-edit"></i><span>الاختبارات</span></div>
        <div class="b-nav-item" id="b-msgs" onclick="switchTab('msgs')"><i class="fas fa-comment-dots"></i><span>الرسائل</span></div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, get, child, set, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCr4T8GLRxtf_6LNrokjKvmBOwSkuGO5yQ",
        authDomain: "hamsa-6009e.firebaseapp.com",
        databaseURL: "https://hamsa-6009e-default-rtdb.firebaseio.com",
        projectId: "hamsa-6009e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.showAlert = (msg, type = 'success') => {
        const box = document.getElementById('customAlert');
        document.getElementById('alertText').innerText = msg;
        box.style.borderColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
        document.getElementById('alertIcon').innerHTML = type === 'success' ? '✅' : '⚠️';
        box.classList.add('show');
        setTimeout(() => box.classList.remove('show'), 4000);
    };

    window.login = async () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const snap = await get(child(ref(db), 'students'));
        const user = Object.values(snap.val() || {}).find(s => s.username === u && s.password === p);
        if(user) { localStorage.setItem('user', JSON.stringify(user)); startApp(user); }
        else showAlert("بيانات الدخول خاطئة!", "error");
    };

    function startApp(user) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        document.getElementById('uNameSide').innerText = user.name;
        document.getElementById('uGradeSide').innerText = user.grade;
        document.getElementById('welcomeText').innerText = `مرحباً بك يا ${user.name} 👋 😍`;
        switchTab('lessons');
    }

    // دالة لتحديد التقدير بناءً على النسبة
    function getRating(score, total) {
        const percent = (score / total) * 100;
        if (percent >= 90) return { text: "ممتاز 🏆", class: "excellent" };
        if (percent >= 80) return { text: "جيد جداً ⭐", class: "very-good" };
        if (percent >= 65) return { text: "جيد 👍", class: "good" };
        return { text: "يحتاج تحسين ✍️", class: "fail" };
    }

    window.switchTab = async (tab) => {
        const user = JSON.parse(localStorage.getItem('user'));
        const display = document.getElementById('mainDisplay');
        const actions = document.getElementById('extraActions');
        
        document.querySelectorAll('.nav-link, .b-nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`l-${tab}`)?.classList.add('active');
        document.getElementById(`b-${tab}`)?.classList.add('active');
        document.getElementById('tabTitle').innerText = tab === 'exams' ? "اختباراتي" : (tab === 'msgs' ? "الرسائل" : "دروسي");
        document.getElementById('welcomeSection').style.display = 'block';
        actions.innerHTML = '';

        if(tab === 'exams') {
            actions.innerHTML = `<button class="history-btn" onclick="showGradeHistory()"><i class="fas fa-award"></i> سجل إنجازاتي</button>`;
            display.innerHTML = '<div class="loader"></div>';
            
            try {
                const [examsSnap, resultsSnap] = await Promise.all([
                    get(child(ref(db), 'exams')),
                    get(child(ref(db), `results/${user.username}`))
                ]);

                const exams = examsSnap.val() || {};
                const userResults = resultsSnap.val() || {};
                let html = '<div style="display:grid; gap:15px;">';
                let hasExams = false;

                Object.keys(exams).forEach(id => {
                    if(exams[id].grade === user.grade) {
                        hasExams = true;
                        const isSolved = userResults[id] !== undefined;
                        html += `
                        <div class="exam-item-card">
                            <div>
                                <h3 style="margin:0; color:var(--primary); font-size:16px;">${exams[id].title}</h3>
                                <small>${isSolved ? '✅ تم التسليم' : '📝 ' + exams[id].questions.length + ' سؤال'}</small>
                            </div>
                            ${isSolved 
                                ? `<button class="btn-done">تم الانتهاء <i class="fas fa-check-circle"></i></button>`
                                : `<button class="btn-start-quiz" onclick="takeExam('${id}')">ابدأ الآن <i class="fas fa-play"></i></button>`}
                        </div>`;
                    }
                });
                display.innerHTML = hasExams ? html + '</div>' : '<p style="text-align:center; color:#94a3b8;">لا توجد اختبارات متاحة حالياً</p>';
                window.examsCache = exams;
            } catch (e) { display.innerHTML = "فشل التحميل"; }
        } else {
            display.innerHTML = '<div style="text-align:center; padding:50px; color:#94a3b8;"><i class="fas fa-clock" style="font-size:40px; margin-bottom:15px;"></i><p>المحتوى سيظهر هنا قريباً</p></div>';
        }
    };

    window.showGradeHistory = async () => {
        const user = JSON.parse(localStorage.getItem('user'));
        const display = document.getElementById('mainDisplay');
        display.innerHTML = '<div class="loader"></div>';

        const [examsSnap, resultsSnap] = await Promise.all([
            get(child(ref(db), 'exams')),
            get(child(ref(db), `results/${user.username}`))
        ]);

        const exams = examsSnap.val() || {};
        const results = resultsSnap.val() || {};
        
        let html = `<div style="background:white; border-radius:20px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                    <table style="width:100%; border-collapse:collapse; text-align:right;">
                    <tr style="border-bottom:2px solid #f1f5f9; color:#64748b; font-size:13px;">
                        <th style="padding:10px 5px;">الاختبار</th>
                        <th style="padding:10px 5px;">الدرجة</th>
                        <th style="padding:10px 5px;">التقدير</th>
                    </tr>`;

        let count = 0;
        Object.keys(results).forEach(examId => {
            if(exams[examId]) {
                count++;
                const res = results[examId];
                const rating = getRating(res.score, res.total);
                html += `<tr style="border-bottom:1px solid #f8fafc;">
                    <td style="padding:15px 5px; font-weight:700; font-size:14px;">${exams[examId].title}</td>
                    <td style="padding:15px 5px; font-weight:900; color:var(--primary);">${res.score}/${res.total}</td>
                    <td style="padding:15px 5px;"><span class="grade-badge ${rating.class}">${rating.text}</span></td>
                </tr>`;
            }
        });

        html += '</table>';
        if(count === 0) html = '<p style="text-align:center; color:#94a3b8;">لم تحل أي اختبارات بعد 📝</p>';
        
        display.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                <button onclick="switchTab('exams')" style="border:none; background:none; color:var(--primary); font-weight:900; cursor:pointer;"><i class="fas fa-arrow-right"></i> العودة</button>
                <h3 style="margin:0;">سجل درجاتي</h3>
            </div>
            ${html}`;
    };

    window.takeExam = (id) => {
        const exam = window.examsCache[id];
        const display = document.getElementById('mainDisplay');
        document.getElementById('welcomeSection').style.display = 'none';
        document.getElementById('extraActions').innerHTML = '';
        
        let html = `<div style="background:white; padding:25px; border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2 style="color:var(--primary); margin:0;">${exam.title}</h2>
                        <button onclick="switchTab('exams')" style="border:none; background:#fee2e2; color:var(--danger); padding:5px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">إلغاء</button>
                    </div><hr style="opacity:0.1; margin:20px 0;">`;
        
        exam.questions.forEach((q, i) => {
            html += `
            <div style="margin-bottom:30px;">
                <p style="font-weight:900; margin-bottom:15px; font-size:17px;">${i+1}. ${q.text}</p>
                ${q.options.map((opt, optIdx) => `
                    <label>
                        <input type="radio" name="q${i}" value="${optIdx}">
                        <div class="quiz-option">${opt}</div>
                    </label>
                `).join('')}
            </div>`;
        });
        html += `<button onclick="finishExam('${id}')" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:15px; font-weight:900; font-size:18px; cursor:pointer; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);">إرسال الإجابات</button></div>`;
        display.innerHTML = html;
        window.scrollTo(0,0);
    };

    window.finishExam = async (examId) => {
        const exam = window.examsCache[examId];
        const user = JSON.parse(localStorage.getItem('user'));
        let score = 0;
        let allAnswered = true;

        exam.questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if(sel) { if(parseInt(sel.value) === q.correct) score++; }
            else { allAnswered = false; }
        });

        if(!allAnswered && !confirm("لم تجب على جميع الأسئلة، هل تريد الاستمرار؟")) return;

        try {
            await set(ref(db, `results/${user.username}/${examId}`), { score, total: exam.questions.length, date: Date.now() });
            showAlert("ممتاز! تم حفظ نتيجتك في سجل الإنجازات 😍");
            switchTab('exams');
        } catch(e) { showAlert("خطأ في الإرسال", "error"); }
    };

    window.logout = () => { localStorage.clear(); location.reload(); };
    window.toggleSidebar = (f) => {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        if(f === false) { sb.classList.remove('open'); ov.classList.remove('active'); }
        else { sb.classList.toggle('open'); ov.classList.toggle('active'); }
    };

    const saved = localStorage.getItem('user');
    if(saved) startApp(JSON.parse(saved));
</script>
</body>
</html>
